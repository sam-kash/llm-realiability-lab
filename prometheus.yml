global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: "workers"
    static_configs:
      - targets:
          - "host.docker.internal:4001"
          - "host.docker.internal:4002"
          - "host.docker.internal:4003"